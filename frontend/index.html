<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="container py-2" style="max-width: 1000px;">
 
    <!-- Header -->
    <div class="page-header">
        <h1>🤖 AI Customer Support CRM</h1>
        <p>FastAPI · SQLite · Machine Learning</p>
    </div>
 
    <!-- Stats -->
    <div class="row g-3 mb-3">
        <div class="col-4">
            <div class="stat-card total">
                <div class="stat-num" id="totalTickets">0</div>
                <div class="stat-label">Total Tickets</div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-card open">
                <div class="stat-num" id="openTickets">0</div>
                <div class="stat-label">Open</div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-card closed">
                <div class="stat-num" id="closedTickets">0</div>
                <div class="stat-label">Closed</div>
            </div>
        </div>
    </div>
 
    <!-- Create Ticket -->
    <div class="card">
        <div class="section-title">Create Ticket</div>
        <div class="row g-2 mb-2">
            <div class="col-md-6">
                <input type="text" id="name" class="form-control" placeholder="Customer name">
            </div>
            <div class="col-md-6">
                <input type="email" id="email" class="form-control" placeholder="Customer email">
            </div>
        </div>
        <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
        <textarea id="description" class="form-control mb-3" rows="3" placeholder="Description"></textarea>
        <button class="btn btn-create" onclick="createTicket()">Create Ticket</button>
    </div>
 
    <!-- Search + Filter -->
    <div class="card">
        <div class="search-wrap">
            <input type="text" id="searchInput" class="form-control" placeholder="Search tickets…">
            <select id="statusFilter" class="form-control">
                <option value="">All Statuses</option>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>
            <button class="btn btn-search" onclick="loadTickets()">Search</button>
        </div>
    </div>
 
    <!-- Tickets Table -->
    <div class="card">
        <div class="section-title">Tickets</div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Subject</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketTable">
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">Loading tickets…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
 
</div>
 
<!-- View Ticket Modal -->
<div class="modal-overlay" id="ticketModal">
    <div class="modal-box">
 
        <!-- Close button -->
        <button class="modal-close" onclick="closeModal()" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
 
        <h5>Ticket Details</h5>
        <div id="modalContent"></div>
    </div>
</div>
 
<!-- Toast -->
<div class="toast-msg" id="toast"></div>
 
<script src="script.js"></script>
</body>
</html>
